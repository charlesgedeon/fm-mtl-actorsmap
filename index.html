const getFunction = (stage, role) => FUNCTIONS.find((f) => f.stage === stage && f.role === role);
const actorsForCell = (stage, role) => ACTORS.filter((a) => a.stages.includes(stage) && a.role === role);
const actorsForStage = (stage) => ACTORS.filter((a) => a.stages.includes(stage));
const actorsForRole = (role) => ACTORS.filter((a) => a.role === role);
const matchesSearch = (actor, lang, q) => {
  if (!q.trim()) return true;
  const needle = q.trim().toLowerCase();
  return (
    actor.name.toLowerCase().includes(needle) ||
    tx(actor.desc, lang).toLowerCase().includes(needle) ||
    tx(actor.type, lang).toLowerCase().includes(needle)
  );
};

/* ============================================================
   LIVE SHEET LOADING
   Fetches SHEET_CSV_URL (a Google Sheet published as CSV), turns
   its rows into the same shape as the built-in ACTORS array, and
   swaps ACTORS in place. One row per actor per stage is expected;
   rows sharing a Name get merged into one actor with multiple
   stages. Any row with an unrecognized Stage or Functional Role
   value, or a blank Name, is skipped rather than crashing the load.
   ============================================================ */

const normalizeLabel = (s) => (s || "").trim().toLowerCase().replace(/\s*\/\s*/g, "/").replace(/\s+/g, " ");
const STAGE_LABEL_TO_ID = Object.fromEntries(STAGES.map((s) => [normalizeLabel(s.en), s.id]));
const ROLE_LABEL_TO_ID = Object.fromEntries(ROLES.map((r) => [normalizeLabel(r.en), r.id]));
const ROLE_TYPE_FALLBACK = {
  knowledge: { en: "Knowledge & research organization", fr: "Organisme de savoir et de recherche" },
  advisory: { en: "Technical & advisory provider", fr: "Fournisseur technique et conseil" },
  financial: { en: "Financial institution", fr: "Institution financière" },
  government: { en: "Government / public agency", fr: "Gouvernement / organisme public" },
  ecosystem: { en: "Ecosystem organization", fr: "Organisme de l'écosystème" },
};

function slugifyActorName(name) {
  return (
    name
      .normalize("NFKD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]+/g, "_")
      .replace(/^_+|_+$/g, "")
      .toLowerCase()
      .slice(0, 40) || "actor"
  );
}

function transformSheetRowsToActors(rows) {
  const byName = new Map();
  for (const row of rows) {
    const name = (row["Name"] || "").trim();
    if (!name) continue;
    const stageId = STAGE_LABEL_TO_ID[normalizeLabel(row["Stage"])];
    const roleId = ROLE_LABEL_TO_ID[normalizeLabel(row["Functional Role"])];
    if (!stageId || !roleId) continue; // skip rows with an unrecognized stage/role rather than fail the whole load

    if (!byName.has(name)) {
      const descEn = (row["Description (EN)"] || "").trim();
      const descFr = (row["Description (FR)"] || "").trim() || descEn;
      byName.set(name, {
        id: slugifyActorName(name),
        name,
        role: roleId,
        stages: [],
        type: ROLE_TYPE_FALLBACK[roleId],
        desc: { en: descEn, fr: descFr },
        url: (row["URL"] || "").trim() || "#",
        languages: ["fr", "en"],
        initiatives: [],
      });
    }
    const actor = byName.get(name);
    if (!actor.stages.includes(stageId)) actor.stages.push(stageId);
  }
  return Array.from(byName.values());
}

                >
                  <div className="flex items-center justify-between">
                    <Coord r={ri + 1} c={ci + 1} />
                    <span
                      className="px-1.5 rounded-sm"
                      style={{ background: TOKENS.mossLight, color: TOKENS.forest, fontFamily: "'Montserrat', sans-serif", fontSize: 10 }}
                    >
                      {count}
                    </span>
                  </div>
                  <div style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 600, fontSize: 12.5, color: TOKENS.ink, marginTop: 6, lineHeight: 1.3 }}>
                    {tx(fn?.label, lang)}
                  </div>
                </button>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   GUIDED FINDER VIEW
   ============================================================ */

function SelectChip({ value, onChange, options, placeholder }) {
  return (
    <span className="relative inline-block">
      <select
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="fm-select appearance-none cursor-pointer"
        style={{
          fontFamily: "'Montserrat', sans-serif",
          fontWeight: 600,
          fontSize: "inherit",
          color: TOKENS.paper,
          background: "transparent",
          borderBottom: `2px solid ${TOKENS.ochreLight}`,
          padding: "0 26px 2px 2px",
        }}
      >
        {placeholder && <option value="">{placeholder}</option>}
        {options.map((o) => (
          <option key={o.value} value={o.value}>
            {o.label}
          </option>
        ))}
      </select>
      <ChevronDown size={14} color={TOKENS.ochreLight} style={{ position: "absolute", right: 4, top: "50%", transform: "translateY(-50%)", pointerEvents: "none" }} />
    </span>
  );
}

function GuidedFinder({ lang, ui, search, setSearch, onOpenActor }) {
  const [stage, setStage] = useState(STAGES[0].id);
  const [role, setRole] = useState("");

  const groups = useMemo(() => {
    const activeRoles = role ? ROLES.filter((r) => r.id === role) : ROLES;
    return activeRoles
      .map((r) => ({
        role: r,
        fn: getFunction(stage, r.id),
        actors: actorsForCell(stage, r.id).filter((a) => matchesSearch(a, lang, search)),
      }))
      .filter((g) => g.actors.length > 0 || !role);
  }, [stage, role, lang, search]);

  const totalCount = groups.reduce((sum, g) => sum + g.actors.length, 0);

  return (
    <div>
      <div
        className="p-6 rounded-md"
        style={{ background: TOKENS.forestDark, color: TOKENS.paper }}
      >
        <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 22, lineHeight: 1.6 }}>
          {ui.sentence1}{" "}
          <SelectChip
            value={stage}
            onChange={setStage}
            options={STAGES.map((s) => ({ value: s.id, label: tx(s, lang) }))}
          />{" "}
          {ui.sentence2}{" "}
          <SelectChip
            value={role}
            onChange={setRole}
            options={ROLES.map((r) => ({ value: r.id, label: tx(r, lang) }))}
            placeholder={ui.roleAny}
          />{" "}
          {ui.sentence3}
        </p>
      </div>

      <div
        className="mt-4 flex items-center gap-2 px-3 py-2 rounded-sm max-w-md"
        style={{ background: "#fff", border: `1px solid ${TOKENS.line}` }}
      >
        <Search size={14} color={TOKENS.slate} />
        <input
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder={ui.searchPlaceholder}
          className="w-full outline-none bg-transparent"
          style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 13 }}
        />
      </div>
      <div style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: TOKENS.forest, marginTop: 10 }}>
        {ui.resultsCount(totalCount)}
      </div>

      <div className="mt-5 space-y-7">
        {groups.map((g) => (
          <div key={g.role.id}>
            <div className="flex items-baseline gap-2 pb-2" style={{ borderBottom: `1px solid ${TOKENS.line}` }}>
              <h4 style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 700, fontSize: 16, color: TOKENS.forestDark }}>
                {tx(g.role, lang)}
              </h4>
              <span style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 11, color: TOKENS.moss }}>
                {g.actors.length}
              </span>
            </div>
            <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 13, color: TOKENS.slate, marginTop: 8, lineHeight: 1.55 }}>
              {tx(g.fn?.desc, lang)}
            </p>
            {g.fn?.keywords && (
              <div className="flex flex-wrap gap-1.5 mt-2.5">
                {tx(g.fn.keywords, lang).map((kw) => (
                  <Tag key={kw} tone="ochre">{kw}</Tag>
                ))}
              </div>
            )}
            {g.actors.length > 0 ? (
              <div className="grid sm:grid-cols-2 gap-3 mt-3">
                {g.actors.map((a) => (
                  <ActorCard key={a.id} actor={a} lang={lang} ui={ui} onOpen={onOpenActor} />
                ))}
              </div>
            ) : (
              <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 12.5, color: TOKENS.slate, marginTop: 8, fontStyle: "italic" }}>
                {ui.noActors}
              </p>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */

function App() {
  const [lang, setLang] = useState("fr");
  const [view, setView] = useState("panorama");
  const [selection, setSelection] = useState(null);
  const [drawerSearch, setDrawerSearch] = useState("");
  const [finderSearch, setFinderSearch] = useState("");
  const [detailActor, setDetailActor] = useState(null);
  const [isMobile, setIsMobile] = useState(false);
  const [dataSource, setDataSource] = useState("builtin"); // "builtin" | "live" | "error"
  const [, forceRerender] = useState(0);
  const wrapRef = useRef(null);

  const ui = UI[lang];

  useEffect(() => {
    if (!wrapRef.current) return;
    const el = wrapRef.current;
    const ro = new ResizeObserver((entries) => {
      const w = entries[0].contentRect.width;
      setIsMobile(w < 760);
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    document.documentElement.lang = lang;
  }, [lang]);

  useEffect(() => {
    if (!SHEET_CSV_URL) return; // no sheet configured — built-in data stays in place
    fetch(SHEET_CSV_URL)
      .then((res) => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.text();
      })
      .then((csvText) => {
        const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
        const liveActors = transformSheetRowsToActors(parsed.data);
        if (liveActors.length === 0) throw new Error("Sheet returned no usable rows");
        ACTORS = liveActors; // swap the module-level data in place
        setDataSource("live");
        forceRerender((n) => n + 1); // re-render so every view picks up the new ACTORS
      })
      .catch((err) => {
        console.warn("Finance Montréal navigator: could not load the live Google Sheet, using built-in data.", err);
        setDataSource("error");
      });
  }, []);

  return (
    <div
      ref={wrapRef}
      style={{
        background: TOKENS.paper,
        minHeight: "100%",
        color: TOKENS.ink,
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
        .fm-cell { transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease; }
        .fm-cell:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(16,19,42,0.12); border-color: ${TOKENS.ochre} !important; }
        .fm-card:hover { border-color: ${TOKENS.ochre} !important; box-shadow: 0 4px 14px rgba(16,19,42,0.10); }
        .fm-tab { transition: color .12s ease, border-color .12s ease; }
        .fm-select:focus { outline: none; }
        ::selection { background: ${TOKENS.ochreLight}; }
      `}</style>

      {/* DATA SOURCE BANNER — visible whenever this isn't confirmed live data,
          so a disconnected sheet is impossible to mistake for the real thing */}
      {dataSource !== "live" && (
        <div
          className="px-5 sm:px-8 py-2 text-center"
          style={{ background: "#FDECEC", borderBottom: "1px solid #F3B9B9" }}
        >
          <span style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 600, fontSize: 12.5, color: "#8A2A2A" }}>
            {dataSource === "error" ? ui.bannerError : ui.bannerBuiltin}
          </span>
        </div>
      )}

      {/* HEADER */}
      <header style={{ borderBottom: `1px solid ${TOKENS.line}`, background: TOKENS.paper }}>
        <div className="max-w-5xl mx-auto px-5 sm:px-8 py-5 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div
              className="flex items-center justify-center rounded-sm"
              style={{ width: 38, height: 38, background: TOKENS.forest, color: "#fff", fontFamily: "'Montserrat', sans-serif", fontWeight: 700, fontSize: 15 }}
            >
              FM
            </div>
            <div>
              <div style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 700, fontSize: 16, color: TOKENS.forestDark, lineHeight: 1.1 }}>
                {ui.brand}
              </div>
              <div style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 10.5, color: TOKENS.slate, letterSpacing: "0.04em", marginTop: 2 }}>
                {ui.kicker.toUpperCase()}
              </div>
            </div>
          </div>
          <button
            onClick={() => setLang(lang === "fr" ? "en" : "fr")}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-sm"
            style={{ border: `1px solid ${TOKENS.forest}`, color: TOKENS.forest, fontFamily: "'Montserrat', sans-serif", fontSize: 12 }}
          >
            <Globe size={13} /> {ui.langToggle}
          </button>
        </div>

        {/* TABS */}
        <div className="max-w-5xl mx-auto px-5 sm:px-8 flex gap-6" style={{ borderTop: `1px solid ${TOKENS.line}` }}>
          {[
            { id: "panorama", label: ui.tabPanorama, icon: LayoutGrid },
            { id: "finder", label: ui.tabFinder, icon: Compass },
          ].map((t) => (
            <button
              key={t.id}
              onClick={() => setView(t.id)}
              className="fm-tab flex items-center gap-2 py-3"
              style={{
                borderBottom: `2px solid ${view === t.id ? TOKENS.ochre : "transparent"}`,
                color: view === t.id ? TOKENS.forestDark : TOKENS.slate,
                fontFamily: "'Montserrat', sans-serif",
                fontWeight: 600,
                fontSize: 13.5,
              }}
            >
              <t.icon size={15} /> {t.label}
            </button>
          ))}
        </div>
      </header>

      {/* MAIN */}
      <main className="max-w-5xl mx-auto px-5 sm:px-8 py-7">
        {view === "panorama" ? (
          <>
            <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 13, color: TOKENS.slate, marginBottom: 16, maxWidth: 560 }}>
              {ui.panoramaHint}
            </p>
            <Panorama lang={lang} ui={ui} isMobile={isMobile} onSelect={(sel) => { setSelection(sel); setDrawerSearch(""); }} />
          </>
        ) : (
          <GuidedFinder lang={lang} ui={ui} search={finderSearch} setSearch={setFinderSearch} onOpenActor={setDetailActor} />
        )}
      </main>

      <footer className="max-w-5xl mx-auto px-5 sm:px-8 pb-8">
        <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 10.5, color: TOKENS.moss }}>
          {ui.demoNote}
        </p>
        {SHEET_CSV_URL && (
          <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 10.5, color: TOKENS.moss, marginTop: 2 }}>
            {dataSource === "live" ? ui.dataLive : dataSource === "error" ? ui.dataError : ui.dataLoading}
          </p>
        )}
      </footer>

      <Drawer
        selection={selection}
        lang={lang}
        ui={ui}
        search={drawerSearch}
        setSearch={setDrawerSearch}
        onOpenActor={setDetailActor}
        onClose={() => setSelection(null)}
      />
      <ActorDetail actor={detailActor} lang={lang} ui={ui} onClose={() => setDetailActor(null)} />
    </div>
  );
}


/* ============================================================
   MOUNT
   ============================================================ */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
